name: C++ Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build ME-Tools x86 Release
      run: |
        msbuild ME-Tools.slnx /p:Configuration=Release /p:Platform=x86 /m

    - name: Get Short SHA
      id: vars
      shell: bash
      run: |
        echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Create or Update Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        name: ME-Tools Build [${{ steps.vars.outputs.short_sha }}]
        tag_name: latest
        body: |
          **Automated build generated by GitHub Actions**
          
          - **Commit SHA:** `${{ github.sha }}`
          - **Branch:** `${{ github.ref_name }}`
          - **Build Time:** ${{ github.event.head_commit.timestamp || 'N/A' }}
        draft: false
        prerelease: false
        files: |
          **/Release/*.exe
